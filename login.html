<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — SE Prospection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --bg-deep: #0c0e14;
      --bg-panel: #12151f;
      --bg-card: #181c28;
      --bg-elevated: #1e2333;
      --border: rgba(139, 92, 246, 0.18);
      --text: #e8eaf0;
      --text-muted: #8b92a8;
      --accent: #8b5cf6;
      --accent-2: #6366f1;
      --danger: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-wrap { width: 100%; max-width: 400px; }
    .login-brand {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-logo {
      width: 48px; height: 48px; margin: 0 auto 0.75rem;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff;
    }
    .login-brand h1 { font-size: 1.1rem; }
    .login-brand p { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .login-card h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .field { margin-bottom: 0.85rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      font-weight: 500;
    }
    .input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
    }
    .input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
    }
    .btn-submit {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-submit:hover { opacity: 0.95; }
    .btn-submit:disabled { opacity: 0.6; cursor: wait; }
    .login-error {
      display: none;
      margin-top: 0.75rem;
      padding: 0.55rem 0.75rem;
      border-radius: var(--radius-sm);
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      font-size: 0.82rem;
    }
    .login-error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-logo">SE</div>
      <h1>SE Prospection</h1>
      <p>Souheil Ecom — Connexion équipe</p>
    </div>
    <div class="login-card">
      <h2>Se connecter</h2>
      <form id="loginForm">
        <div class="field">
          <label for="username">Identifiant</label>
          <input class="input" type="text" id="username" name="username" autocomplete="username" required autofocus />
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input class="input" type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-submit" id="btnSubmit">
          <i class="fa-solid fa-right-to-bracket"></i> Connexion
        </button>
        <p class="login-error" id="loginError" role="alert"></p>
      </form>
    </div>
  </div>
  <script type="module" src="/login.js"></script>
</body>
</html>
